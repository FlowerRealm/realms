name: ci-real

on:
  workflow_dispatch:
  # 可选：定时跑真实上游集成回归（注意会产生上游调用成本）
  # schedule:
  #   - cron: "0 3 * * 1"

jobs:
  ci-real:
    runs-on: ubuntu-latest
    env:
      REALMS_CI_UPSTREAM_BASE_URL: ${{ secrets.REALMS_CI_UPSTREAM_BASE_URL }}
      REALMS_CI_UPSTREAM_API_KEY: ${{ secrets.REALMS_CI_UPSTREAM_API_KEY }}
      REALMS_CI_MODEL: ${{ secrets.REALMS_CI_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: CI Real Upstream (Codex + Web curl smoke)
        run: bash "./scripts/ci-real.sh"
