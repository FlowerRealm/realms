name: app

on:
  workflow_dispatch: {}
  push:
    tags:
      - "*"

jobs:
  web:
    name: web (dist-personal)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json

      - name: Build web/dist-personal
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix "web" ci
          npm --prefix "web" run build:personal

      - name: Upload web/dist-personal
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-personal
          path: web/dist-personal
          if-no-files-found: error

  build:
    name: build (${{ matrix.goos }}/${{ matrix.asset_arch }})
    runs-on: ubuntu-latest
    needs: web
    strategy:
      fail-fast: false
      matrix:
        include:
          # Tier 1 (strong guarantee)
          - { goos: darwin,  goarch: amd64, asset_arch: amd64,  ext: "" }
          - { goos: darwin,  goarch: arm64, asset_arch: arm64,  ext: "" }
          - { goos: linux,   goarch: amd64, asset_arch: amd64,  ext: "" }
          - { goos: linux,   goarch: arm64, asset_arch: arm64,  ext: "" }
          - { goos: windows, goarch: amd64, asset_arch: amd64,  ext: ".exe" }
          - { goos: windows, goarch: arm64, asset_arch: arm64,  ext: ".exe" }

          # Tier 2 (best-effort / all compilable targets we support)
          - { goos: linux,   goarch: "386", asset_arch: "386",   ext: "" }
          - { goos: linux,   goarch: arm,   goarm: "7",          asset_arch: armv7, ext: "" }
          - { goos: linux,   goarch: ppc64le, asset_arch: ppc64le, ext: "" }
          - { goos: linux,   goarch: s390x,   asset_arch: s390x,   ext: "" }
          - { goos: linux,   goarch: riscv64, asset_arch: riscv64, ext: "" }
          - { goos: windows, goarch: "386", asset_arch: "386",   ext: ".exe" }
          - { goos: freebsd, goarch: "386", asset_arch: "386",   ext: "" }
          - { goos: freebsd, goarch: amd64, asset_arch: amd64,   ext: "" }
          - { goos: freebsd, goarch: arm64, asset_arch: arm64,   ext: "" }
          - { goos: freebsd, goarch: arm,   goarm: "7",          asset_arch: armv7, ext: "" }
          - { goos: openbsd, goarch: amd64, asset_arch: amd64,   ext: "" }
          - { goos: openbsd, goarch: arm64, asset_arch: arm64,   ext: "" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download web/dist-personal
        uses: actions/download-artifact@v4
        with:
          name: web-dist-personal
          path: web/dist-personal

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build realms-app
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "dist"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export CGO_ENABLED="0"
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          if [[ -n "${{ matrix.goarm }}" ]]; then
            export GOARM="${{ matrix.goarm }}"
          fi

          ASSET="realms-app_${GITHUB_REF_NAME}_${GOOS}_${{ matrix.asset_arch }}${{ matrix.ext }}"

          go build -tags embed_web_personal \
            -ldflags "-X realms/internal/version.Version=${GITHUB_REF_NAME} -X realms/internal/version.Date=${DATE}" \
            -o "dist/${ASSET}" \
            "./cmd/realms-app"

          if [[ "${GOOS}" != "windows" ]]; then
            chmod +x "dist/${ASSET}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: realms-app_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.asset_arch }}
          path: dist/realms-app_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.asset_arch }}*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "dist"
          sha256sum realms-app_* > "realms-app_${GITHUB_REF_NAME}_checksums.txt"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/realms-app_*

  npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish npm package (tools/npm/realms)
        shell: bash
        working-directory: tools/npm/realms
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN 未配置，跳过 npm publish。"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          npm version --no-git-tag-version "${VERSION}"
          npm publish --access public
