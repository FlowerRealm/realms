name: app

on:
  workflow_dispatch: {}
  push:
    tags:
      - "*"

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json

      - name: Build web/dist
        if: runner.os != 'Windows'
        shell: bash
        run: |
          npm --prefix "web" ci
          npm --prefix "web" run build:self

      - name: Build web/dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm --prefix "web" ci
          npm --prefix "web" run build:self

      - name: Build realms-app
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -tags embed_web_self \
            -ldflags "-X realms/internal/version.Version=${GITHUB_REF_NAME} -X realms/internal/version.Date=${DATE}" \
            -o "dist/realms-app" \
            "./cmd/realms-app"

      - name: Build realms-app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          go build -tags embed_web_self `
            -ldflags "-X realms/internal/version.Version=${env:GITHUB_REF_NAME} -X realms/internal/version.Date=$date" `
            -o "dist/realms-app.exe" `
            "./cmd/realms-app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: realms-app-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*
