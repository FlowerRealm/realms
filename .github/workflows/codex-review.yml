name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate PR diff
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --unified=3 "origin/${{ github.base_ref }}"...HEAD > pr.diff || true

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex (CLI)
        env:
          CODEX_HOME: ${{ github.workspace }}/.github/codex/home
          MYPROXY_API_KEY: ${{ secrets.MYPROXY_API_KEY }}
        run: |
          PROMPT="$(cat .github/codex/prompts/review.md)"
          codex exec --profile pr_review "$PROMPT" > codex-output.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("codex-output.md", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });