name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex_review:
    if: >-
      ${{
        github.actor != 'github-actions[bot]' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Mint Codex GitHub App token (optional)
        id: codex_token
        if: ${{ secrets.CODEX_GITHUB_APP_ID != '' && secrets.CODEX_GITHUB_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CODEX_GITHUB_APP_ID }}
          private-key: ${{ secrets.CODEX_GITHUB_APP_PRIVATE_KEY }}

      - name: Resolve PR context
        id: meta
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.codex_token.outputs.token || github.token }}
          script: |
            const pr = context.payload.pull_request;
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('base_ref', String(pr.base.ref));
            core.setOutput('head_sha', String(pr.head.sha));

      - name: Post placeholder (👀)
        id: placeholder
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.codex_token.outputs.token || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- CODEX_REVIEW_PLACEHOLDER -->';

            const list = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = (list.data || [])
              .filter((c) => (c.user?.type || '') === 'Bot')
              .filter((c) => String(c.body || '').includes(marker))
              .sort((a, b) => new Date(b.updated_at).getTime() - new Date(a.updated_at).getTime())[0];

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: `👀\n\n${marker}`,
              });
              core.setOutput('comment_id', String(existing.id));
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `👀\n\n${marker}`,
              });
              core.setOutput('comment_id', String(created.data.id));
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate PR diff
        run: |
          git fetch origin "${{ steps.meta.outputs.base_ref }}" --depth=1
          git diff --unified=3 "origin/${{ steps.meta.outputs.base_ref }}"..."${{ steps.meta.outputs.head_sha }}" > pr.diff || true

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex (CLI)
        env:
          CODEX_HOME: ${{ github.workspace }}/.github/codex/home
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          PROMPT="$(cat .github/codex/prompts/review.md)"
          codex exec --profile pr_review "$PROMPT" > codex-output.md

      - name: Post review (PR review + inline threads)
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.codex_token.outputs.token || github.token }}
          script: |
            const post = require('./.github/codex/scripts/post_review.js');
            process.env.PR_NUMBER = '${{ steps.meta.outputs.pr_number }}';
            process.env.HEAD_SHA = '${{ steps.meta.outputs.head_sha }}';
            process.env.PLACEHOLDER_COMMENT_ID = '${{ steps.placeholder.outputs.comment_id }}';
            await post({ github, context, core });
