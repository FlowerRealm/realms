name: npm-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm version (no leading v), e.g. 0.16.1"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish npm package (@flowerrealm/realms)
        shell: bash
        working-directory: tools/npm/realms
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN 未配置，无法发布。"
            exit 1
          fi
          npm version --no-git-tag-version "${{ inputs.version }}"
          npm publish --access public

