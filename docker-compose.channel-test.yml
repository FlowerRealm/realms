# Optional overlay: docker compose -f docker-compose.yml -f docker-compose.channel-test.yml up -d
services:
  cli-runner:
    build: ./tools/cli-runner
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CLI_RUNNER_PORT:-3100}:3100"

  realms:
    environment:
      REALMS_CHANNEL_TEST_CLI_RUNNER_URL: "http://cli-runner:3100"
